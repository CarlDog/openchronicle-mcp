# Dependabot config for openchronicle-mcp (v3).
#
# `target-branch: v3/develop` is pre-cutover only. After Phase 8 force-pushes
# v3/develop → main, remove the `target-branch` lines so PRs land on the
# default branch automatically. (See docs/V3_PLAN.md Phase 9 Day 0.)

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: v3/develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
      python-major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    target-branch: v3/develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      actions-all:
        update-types:
          - minor
          - patch
          - major

  - package-ecosystem: docker
    directory: /
    target-branch: v3/develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
