name: Test

on:
  push:
    branches: [main, v3/develop]
  pull_request:
    branches: [main, v3/develop]

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,mcp,openai,ollama]"

      - name: Test (no integration)
        # Integration tests require live provider keys and the
        # `integration` marker; CI validates unit + functional only.
        # -v gives per-test names so a hang surfaces which test died.
        run: pytest -m "not integration" -v

  quality:
    name: lint + format + types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,mcp,openai,ollama]"

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format check
        run: ruff format --check src tests scripts

      - name: Mypy
        run: mypy src tests --config-file=pyproject.toml
