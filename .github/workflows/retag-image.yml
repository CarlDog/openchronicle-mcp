name: Retag GHCR Image

# Manually-triggered utility for creating an alias tag on an existing
# GHCR image without rebuilding or re-pulling. Used pre-cutover to pin
# the v2 image as `:v2-final` for rollback, and useful for any future
# release-alias housekeeping (e.g. promoting `:v3.0.0-rc1` → `:v3.0.0`).
#
# `docker buildx imagetools create` copies the manifest list across
# tags, so multi-arch tags stay multi-arch.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing tag to copy from (e.g. latest)"
        required: true
        default: "latest"
      dest_tag:
        description: "New tag to create (e.g. v2-final)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Retag ${{ inputs.source_tag }} -> ${{ inputs.dest_tag }}
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.dest_tag }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.source_tag }}

      - name: Verify
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.dest_tag }}
