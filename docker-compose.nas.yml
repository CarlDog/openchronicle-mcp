# OpenChronicle v3 — NAS deployment (Portainer stack)
#
# Single service. The unified ASGI process serves the HTTP REST surface
# at /api/v1/* and the MCP streamable-HTTP transport at /mcp on the same
# port. v2's three-service split (serve / mcp / discord) is gone with
# the conversation/Discord/separate-MCP subsystems on
# `archive/openchronicle.v2`.
#
# === Stack-level environment variables ===
# Values using ${VAR} syntax come from Portainer's stack Environment
# variables (Stacks → this stack → Environment variables). Hardcoded
# values are container-internal paths and the deployment shape — they
# don't change per environment.
#
#   Recommended:
#     OC_API_KEY            Bearer token for HTTP API auth. Without it,
#                           anything on the NAS network can hit :8000.
#     OC_API_CORS_ORIGINS   Comma-separated browser origins allowed for
#                           cross-origin API calls.
#     OC_EMBEDDING_PROVIDER none (default) | stub | openai | ollama
#                           Set to enable hybrid FTS5+semantic search.
#     OC_EMBEDDING_MODEL    Provider-specific embedding model name.
#     OC_EMBEDDING_API_KEY  Explicit embedding API key override.
#
#   Optional — persistent storage:
#     The DB and internal runtime state live in the `oc-data` named
#     volume (never operator-relocatable). The config dir defaults to
#     a named volume too; set HOST_CONFIG_DIR to a host path to switch
#     to bind-mount mode.
#       HOST_CONFIG_DIR     Host path for /config (core.json + model
#                           configs). On first start with an empty
#                           bind-mount, the entrypoint copies example
#                           configs (creates a .bootstrapped marker so
#                           it doesn't repeat).
#
#   Optional — deployment shape:
#     OC_TAG                Image tag (default: latest). Pin to a SHA
#                           for reproducible deploys.
#     HOST_HTTP_PORT        Host port for the unified app (default:
#                           18000 — matches the v2 HTTP port; MCP is
#                           reachable at the same port at /mcp now).
#                           Override only if you redeploy somewhere
#                           that already binds 18000.
#     OC_LOG_FORMAT         "human" (default) or "json" for Loki/
#                           OpenSearch/Datadog ingestion.
#     OC_LOG_LEVEL          DEBUG | INFO (default) | WARNING | ERROR.
#     OLLAMA_HOST           e.g. http://host.docker.internal:11434
#                           if Ollama runs on the NAS host (used for
#                           embeddings only — there's no LLM in v3).
#     OC_GIT_TOKEN          GitHub PAT for `onboard_git` to clone
#                           private repos (fine-grained, contents:read
#                           scope). Public repos work without it.
#
# Image: ghcr.io/carldog/openchronicle-mcp (multi-arch, published by
# GitHub Actions on every push to main).

services:
  oc:
    image: ghcr.io/carldog/openchronicle-mcp:${OC_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-18000}:8000"
    environment:
      # Container-internal storage paths (operators tune the *host* side
      # via HOST_*_DIR vars in the volumes section, not these). The DB
      # is intentionally NOT operator-tunable: the named-volume mount at
      # /data keeps the SQLite file safe from external interference.
      OC_CONFIG_DIR: /config
      OC_DB_PATH: /data/openchronicle.db
      OC_OUTPUT_DIR: /output
      # Bind the unified ASGI to all interfaces inside the container.
      OC_API_HOST: 0.0.0.0
      OC_API_PORT: "8000"
      # Auth + CORS (Portainer stack env):
      OC_API_KEY: ${OC_API_KEY:-}
      OC_API_CORS_ORIGINS: ${OC_API_CORS_ORIGINS:-}
      # Embeddings (Portainer stack env; default 'none' = FTS5-only):
      OC_EMBEDDING_PROVIDER: ${OC_EMBEDDING_PROVIDER:-}
      OC_EMBEDDING_MODEL: ${OC_EMBEDDING_MODEL:-}
      OC_EMBEDDING_API_KEY: ${OC_EMBEDDING_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      # MCP transport security (Portainer stack env). Default of empty
      # falls through to MCPConfig's localhost-only allowlist; operators
      # binding to a LAN-reachable interface MUST set this in the
      # Portainer stack to include their hostname or all non-loopback
      # clients get 421 Invalid Host header. See env_vars.md.
      OC_MCP_ALLOWED_HOSTS: ${OC_MCP_ALLOWED_HOSTS:-}
      # Git onboarding (Portainer stack env):
      OC_GIT_TOKEN: ${OC_GIT_TOKEN:-}
      # Logging posture (Q19 locked):
      OC_LOG_FORMAT: ${OC_LOG_FORMAT:-human}
      OC_LOG_LEVEL: ${OC_LOG_LEVEL:-INFO}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - oc-data:/data
      - ${HOST_CONFIG_DIR:-oc-config}:/config
      - oc-output:/output
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://127.0.0.1:8000/health'',timeout=3).status==200 else 1)"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  oc-data:
  oc-config:
  oc-output:
