# OpenChronicle MCP — NAS deployment (Portainer stack)
#
# Two long-lived services:
#   serve  — HTTP API on :8000 (REST + auto-starts when container starts)
#   mcp    — MCP server on :8080 via streamable-http transport (reachable
#            from MCP clients over the network — Claude Code, Goose, etc.)
#
# Skipped intentionally: `discord` (not currently used), `openchronicle`
# adhoc-CLI runner (use `docker exec` into one of the running services
# instead).
#
# === Stack-level environment variables ===
# Every value below using ${VAR} syntax is sourced from Portainer's
# stack Environment variables section (Stacks → this stack →
# Environment variables). Values *without* ${...} are container-internal
# paths and the deployment shape — they don't change per environment.
#
#   Required:
#     OC_LLM_PROVIDER       openai | anthropic | groq | gemini | ollama | stub
#     One matching API key — OPENAI_API_KEY / ANTHROPIC_API_KEY /
#                             GROQ_API_KEY / GEMINI_API_KEY (depending on
#                             OC_LLM_PROVIDER above)
#
#   Recommended:
#     OC_API_KEY            Bearer token for HTTP API auth. Without it,
#                           anything on the NAS network can hit :8000.
#     OC_EMBEDDING_PROVIDER none (default) | openai | ollama
#                           Set to enable hybrid FTS5+semantic search.
#     OC_EMBEDDING_MODEL    Provider-specific embedding model name.
#
#   Optional — deployment shape:
#     OC_TAG                Image tag (default: latest). Pin to a SHA
#                           for reproducible deploys.
#     HOST_HTTP_PORT        Host port for HTTP API (default: 18000 — chosen
#                           because :8000 is taken by portainer-ce on
#                           carldog-nas. Override only if you redeploy
#                           somewhere else and want a different port).
#     HOST_MCP_PORT         Host port for MCP streamable-http (default: 18001
#                           — chosen because :8080 is taken by sabnzbd and
#                           :18080 by qbittorrent on carldog-nas).
#     OLLAMA_HOST           e.g. http://host.docker.internal:11434
#                           if Ollama runs on the NAS host.
#     OC_GIT_TOKEN          GitHub PAT for `onboard_git` to clone private
#                           repos (fine-grained, contents:read scope).
#                           Without it, only public github.com repos work.
#
#   Optional — multi-provider / Mixture-of-Experts (MoE):
#     XAI_API_KEY           xAI Grok Imagine media generation.
#     OC_MOE_ENABLED            "1"/"true" to enable MoE consensus mode.
#                               Requires multiple providers in pools below.
#     OC_MOE_MIN_EXPERTS        Quorum size for consensus (default 2).
#     OC_MOE_TEMPERATURE        Override sampling temp for MoE runs.
#     OC_LLM_FAST_POOL          CSV provider:model — fast-mode fallback chain
#                               e.g. "openai:gpt-4o-mini,ollama:mistral:instruct"
#     OC_LLM_QUALITY_POOL       CSV provider:model — quality-mode fallback chain
#                               e.g. "anthropic:claude-sonnet-4-20250514,openai:gpt-4o"
#     OC_LLM_POOL_NSFW          CSV provider:model — NSFW-routed pool.
#     OC_LLM_PROVIDER_WEIGHTS   Provider preference scores
#                               (default "ollama:100,openai:20")
#     OC_LLM_DEFAULT_MODE       "fast" (default) | "quality"
#     OC_LLM_MODEL_FAST         Model name when in fast mode (default gpt-4o-mini)
#     OC_LLM_MODEL_QUALITY      Model name when in quality mode (default gpt-4o)
#
#   Optional — per-provider model + endpoint overrides:
#     OPENAI_MODEL          e.g. "gpt-4o" or "gpt-4o-mini" (default).
#     ANTHROPIC_MODEL       e.g. "claude-sonnet-4-20250514" (default).
#     GROQ_MODEL            e.g. "llama-3.3-70b-versatile" (default).
#     GEMINI_MODEL          e.g. "gemini-2.0-flash" (default).
#     OLLAMA_MODEL          e.g. "llama3.1" (default).
#     OPENAI_BASE_URL       Custom OpenAI endpoint (Azure OpenAI, proxies, etc.)
#     ANTHROPIC_BASE_URL    Custom Anthropic endpoint.
#
# Image: ghcr.io/carldog/openchronicle-mcp (multi-arch, published by
# GitHub Actions on every push to main).

# Shared env block — referenced by both `serve` and `mcp` via YAML
# anchors. Container-internal paths stay literal; Portainer-sourced
# values use ${VAR} (or ${VAR:-default}) substitution at deploy time.
x-oc-env: &oc-env
  # Container-internal paths (hardcoded, deployment shape):
  OC_DB_PATH: /data/openchronicle.db
  OC_CONFIG_DIR: /config
  OC_OUTPUT_DIR: /output
  OC_ASSETS_DIR: /assets
  # Portainer stack env (required):
  OC_LLM_PROVIDER: ${OC_LLM_PROVIDER}
  # Portainer stack env (provider keys — set whichever match the providers
  # you actually use; multi-provider setups need all the keys you'll route to):
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}
  # Portainer stack env (embedding):
  OC_EMBEDDING_PROVIDER: ${OC_EMBEDDING_PROVIDER:-}
  OC_EMBEDDING_MODEL: ${OC_EMBEDDING_MODEL:-}
  # Portainer stack env (provider connection overrides):
  OLLAMA_HOST: ${OLLAMA_HOST:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
  # Portainer stack env (per-provider model overrides — what model to use
  # when that provider is selected; defaults defined in each adapter):
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
  GROQ_MODEL: ${GROQ_MODEL:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-}
  # Portainer stack env (routing — mode + model defaults + multi-provider pools):
  OC_LLM_DEFAULT_MODE: ${OC_LLM_DEFAULT_MODE:-}
  OC_LLM_MODEL_FAST: ${OC_LLM_MODEL_FAST:-}
  OC_LLM_MODEL_QUALITY: ${OC_LLM_MODEL_QUALITY:-}
  OC_LLM_FAST_POOL: ${OC_LLM_FAST_POOL:-}
  OC_LLM_QUALITY_POOL: ${OC_LLM_QUALITY_POOL:-}
  OC_LLM_POOL_NSFW: ${OC_LLM_POOL_NSFW:-}
  OC_LLM_PROVIDER_WEIGHTS: ${OC_LLM_PROVIDER_WEIGHTS:-}
  # Portainer stack env (Mixture-of-Experts consensus mode):
  OC_MOE_ENABLED: ${OC_MOE_ENABLED:-}
  OC_MOE_MIN_EXPERTS: ${OC_MOE_MIN_EXPERTS:-}
  OC_MOE_TEMPERATURE: ${OC_MOE_TEMPERATURE:-}
  # Portainer stack env (git):
  OC_GIT_TOKEN: ${OC_GIT_TOKEN:-}

x-oc-volumes: &oc-volumes
  - oc-data:/data
  - oc-config:/config
  - oc-output:/output
  - oc-assets:/assets

x-oc-extra-hosts: &oc-extra-hosts
  - host.docker.internal:host-gateway

services:
  serve:
    image: ghcr.io/carldog/openchronicle-mcp:${OC_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-18000}:8000"
    environment:
      <<: *oc-env
      # serve-only:
      OC_API_HOST: 0.0.0.0
      OC_API_KEY: ${OC_API_KEY:-}
    extra_hosts: *oc-extra-hosts
    volumes: *oc-volumes
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health',timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mcp:
    image: ghcr.io/carldog/openchronicle-mcp:${OC_TAG:-latest}
    entrypoint: ["oc", "mcp", "serve", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    ports:
      - "${HOST_MCP_PORT:-18001}:8080"
    environment: *oc-env
    extra_hosts: *oc-extra-hosts
    volumes: *oc-volumes
    depends_on:
      serve:
        condition: service_healthy

volumes:
  oc-data:
  oc-config:
  oc-output:
  oc-assets:
