[pytest]
# Professional pytest configuration for OpenChronicle's four-tier testing strategy
minversion = 6.0
addopts = 
    -ra 
    -q 
    --strict-markers 
    --strict-config
    --tb=short
    --maxfail=5
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Four-tier testing strategy markers
markers =
    production_real: Production code tests using real model adapters and content
    production_mock: Production code tests using mock adapters and test content
    smoke: Quick smoke tests for major functionality validation
    core: Essential core functionality tests
    stress: High-load stress testing (isolated execution only)
    chaos: Chaos engineering and fault injection tests
    unit: Unit tests for individual components
    integration: Integration tests between orchestrators
    workflow: End-to-end workflow tests
    slow: Tests that take longer than 5 seconds
    requires_models: Tests requiring LLM model access
    performance: Performance benchmarking tests
    session: User session and interaction tests
    concurrency: Concurrency and thread-safety tests
    mock_only: Tests using only mock data (no external dependencies)
    production: Production deployment validation tests
    
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
