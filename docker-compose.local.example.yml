services:
  openchronicle:
    # Provide an explicit volumes list; keep empty by default so this file is valid YAML.
    volumes: []
    #
    # Option A (recommended for WSL + portability):
    # - Bind relative Linux-style paths that work from WSL or Git Bash.
    # - Create these folders in your repo (e.g., mkdir -p docker/data docker/config).
    #
    # volumes:
    #   - ./docker/data:/data
    #   - ./docker/config:/config
    #   - ./plugins:/plugins
    #
    # Option B (Windows-only PowerShell usage):
    # - Bind absolute Windows paths (ensure the drive/folder is shared in Docker Desktop > Settings > Resources > File sharing).
    #
    # volumes:
    #   - C:/path/to/openchronicle/data:/data
    #   - C:/path/to/openchronicle/config:/config
    #   - ./plugins:/plugins
